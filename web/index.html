<!DOCTYPE html>
<html>
<head>


    <script src="env.js"></script>

    <script>
        const config = window.APP_CONFIG || {};
        window.__APP_CONFIG__ = config;

        if (!config.MAPS_API_KEY)
        {
            throw new Error("Missing MAPS_API_KEY in web/env.js");
        }

        document.write(
            '<script src="https://maps.googleapis.com/maps/api/js?key=' +
            config.MAPS_API_KEY +
            '"><\/script>'
        );
    </script>

    <!-- Thin wrapper around google.maps.DirectionsService used by the Flutter app
         on web to avoid the CORS restrictions of the REST Directions API.
         The function body references google.maps only when called (after the Maps
         SDK above has fully loaded), so it is safe to define it here.

         NOTE: In the JS SDK, route.overview_polyline and step.polyline are
         already encoded strings — NOT objects with a .points property.
         Accessing .points returns undefined, which JSON.stringify silently drops,
         leaving Dart with no polyline data to decode. -->
    <script>
        window.getRoute = function (
          originLat, originLng, destLat, destLng, travelMode, callback
        ) {
          var service = new google.maps.DirectionsService();
          service.route(
            {
              origin:      { lat: originLat, lng: originLng },
              destination: { lat: destLat,   lng: destLng   },
              travelMode:  travelMode
            },
            function (result, status) {
              if (status !== 'OK') {
                callback(JSON.stringify({ error: status }));
                return;
              }
              var route = result.routes[0];
              var leg   = route.legs[0];
              var payload = {
                duration_text:     leg.duration ? leg.duration.text : '',
                duration_value:    leg.duration ? leg.duration.value : 0,
                distance_text:     leg.distance ? leg.distance.text : '',
                // overview_polyline is already the encoded string in the JS SDK —
                // do NOT append .points (that returns undefined on a string).
                overview_polyline: route.overview_polyline,
                steps: leg.steps.map(function (step) {
                  var td   = step.transit_details || {};
                  var line = td.line || {};
                  return {
                    travel_mode:    step.travel_mode,
                    duration_text:  step.duration ? step.duration.text : '',
                    duration_value: step.duration ? step.duration.value : 0,
                    distance_text:  step.distance ? step.distance.text : '',
                    // step.polyline is also already the encoded string in the JS SDK.
                    polyline:       step.polyline,
                    transit_color:  line.color || null,
                    line_name:      line.short_name || line.name || null
                  };
                })
              };
              console.log('[getRoute] payload overview_polyline type:', typeof payload.overview_polyline,
                '| value (first 80 chars):', String(payload.overview_polyline).substring(0, 80),
                '| steps count:', payload.steps.length);
              callback(JSON.stringify(payload));
            }
          );
        };
    </script>
