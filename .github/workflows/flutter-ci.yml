name: Flutter CI

permissions:
  contents: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DIRECTIONS_API_KEY: ${{ secrets.DIRECTIONS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage --dart-define=DIRECTIONS_API_KEY=$DIRECTIONS_API_KEY

      - name: Install Lcov
        if: github.event_name == 'push'
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Generate coverage report
        if: github.event_name == 'push'
        run: |
          genhtml coverage/lcov.info -o ./test_coverage
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./test_coverage
          git commit -m "generated coverage information" || echo "No changes to commit"
          git push
