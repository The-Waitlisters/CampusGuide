name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          DIRECTIONS_API_KEY=${{ secrets.DIRECTIONS_API_KEY }}
          CONCORDIA_USER_ID=${{ secrets.CONCORDIA_USER_ID }}
          CONCORDIA_API_KEY=${{ secrets.CONCORDIA_API_KEY }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          EOF

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests with coverage
        env:
          DIRECTIONS_API_KEY: ${{ secrets.DIRECTIONS_API_KEY }}
          CONCORDIA_USER_ID: ${{ secrets.CONCORDIA_USER_ID }}
          CONCORDIA_API_KEY: ${{ secrets.CONCORDIA_API_KEY }}
        run: |
          DEFINES=""
          
          if [ -n "$DIRECTIONS_API_KEY" ]; then
            DEFINES="$DEFINES --dart-define=DIRECTIONS_API_KEY=$DIRECTIONS_API_KEY"
          fi
          
          if [ -n "$CONCORDIA_USER_ID" ]; then
            DEFINES="$DEFINES --dart-define=CONCORDIA_USER_ID=$CONCORDIA_USER_ID"
          fi
          
          if [ -n "$CONCORDIA_API_KEY" ]; then
            DEFINES="$DEFINES --dart-define=CONCORDIA_API_KEY=$CONCORDIA_API_KEY"
          fi
          
          flutter test --coverage $DEFINES

      - name: Upload LCOV artifact (for Sonar job)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Install lcov (for genhtml)
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Generate HTML coverage report
        run: genhtml coverage/lcov.info -o coverage-html

      - name: Upload HTML coverage artifact (for wiki)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 14

      - name: Upload LCOV to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test-and-coverage

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage-lcov
          path: coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.dart.lcov.reportPaths=coverage/lcov.info
